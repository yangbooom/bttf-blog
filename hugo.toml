# NOTE: HTTP→HTTPS redirect must be configured at DNS/CDN level (e.g., Cloudflare, GitHub Pages settings)
baseURL = 'https://blog.bttf.io/'
title = 'BTTF Blog'
theme = 'os-shell'
enableRobotsTXT = true
buildFuture = true
defaultContentLanguage = 'ko'

[languages]
  [languages.ko]
    languageCode = 'ko'
    languageName = '한국어'
    weight = 1
    [languages.ko.params]
      description = 'on-device AI, 데이터 엔지니어링, DuckDB, WebAssembly, 커스텀 키보드 등 기술 주제를 다루는 블로그'
    [[languages.ko.menus.main]]
      name = 'Posts'
      url = '/posts/'
      weight = 10
    [[languages.ko.menus.main]]
      name = 'Tags'
      url = '/tags/'
      weight = 20
    [[languages.ko.menus.main]]
      name = 'About'
      url = '/about/'
      weight = 30

  [languages.en]
    languageCode = 'en'
    languageName = 'EN'
    weight = 2
    [languages.en.params]
      description = 'A technical blog covering on-device AI, data engineering, DuckDB, WebAssembly, custom keyboards, and more'
    [[languages.en.menus.main]]
      name = 'Posts'
      url = '/en/posts/'
      weight = 10
    [[languages.en.menus.main]]
      name = 'Tags'
      url = '/en/tags/'
      weight = 20
    [[languages.en.menus.main]]
      name = 'About'
      url = '/en/about/'
      weight = 30

[params]
  author = 'kimuyb'
  images = ['/img/og-default.png']
  [params.social]
    twitter = ''

[taxonomies]
  category = 'categories'
  tag = 'tags'

[markup]
  [markup.highlight]
    style = 'dracula'
    lineNos = true
    guessSyntax = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
