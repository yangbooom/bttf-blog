<nav class="os-menubar">
  <div class="menubar-left">
    <a href="{{ "/" | relURL }}" class="menubar-logo" aria-label="Home">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <rect x="1" y="1" width="6" height="6" rx="1"/>
        <rect x="9" y="1" width="6" height="6" rx="1"/>
        <rect x="1" y="9" width="6" height="6" rx="1"/>
        <rect x="9" y="9" width="6" height="6" rx="1"/>
      </svg>
    </a>
    <span class="menubar-title">{{ .Site.Title }}</span>
    {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" class="menubar-item{{ if $.IsMenuCurrent "main" . }} active{{ end }}">{{ .Name }}</a>
    {{ end }}
  </div>
  <div class="menubar-right">
    <span class="menubar-clock" id="menubar-clock"></span>
  </div>
</nav>
