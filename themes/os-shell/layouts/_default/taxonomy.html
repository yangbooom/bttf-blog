{{ define "main" }}
<div class="list-view">
  <div class="list-header">
    <h1 class="list-title">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M17.707 9.293a1 1 0 010 1.414l-7 7a1 1 0 01-1.414 0l-7-7A.997.997 0 012 10V5a3 3 0 013-3h5c.256 0 .512.098.707.293l7 7zM5 6a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
      </svg>
      {{ .Title }}
    </h1>
    <span class="list-count">{{ len .Pages }} items</span>
  </div>

  <div class="list-items">
    {{ range .Pages }}
    <a href="{{ .Permalink }}" class="list-item">
      <div class="list-item-name">
        <svg class="file-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M4 1a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V4.414a1 1 0 00-.293-.707L10.293 1.293A1 1 0 009.586 1H4z"/>
        </svg>
        <span>{{ .Title }}</span>
      </div>
      <div class="list-item-date">{{ .Date.Format "2006-01-02" }}</div>
      <div class="list-item-size">{{ .ReadingTime }} min read</div>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
