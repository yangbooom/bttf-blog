{{ define "main" }}
<div class="list-view">
  <div class="list-header">
    <h1 class="list-title">
      <svg class="folder-icon" width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
        <path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
      </svg>
      {{ .Title }}
    </h1>
    <span class="list-count">{{ len .Pages }} items</span>
  </div>

  <div class="list-toolbar">
    <span class="toolbar-label">Name</span>
    <span class="toolbar-label">Date Modified</span>
    <span class="toolbar-label">Size</span>
  </div>

  <div class="list-items">
    {{ range .Pages }}
    <a href="{{ .Permalink }}" class="list-item">
      <div class="list-item-name">
        <svg class="file-icon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M4 1a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V4.414a1 1 0 00-.293-.707L10.293 1.293A1 1 0 009.586 1H4z"/>
        </svg>
        <span>{{ .Title }}</span>
      </div>
      <div class="list-item-date">{{ .Date.Format "2006-01-02 15:04" }}</div>
      <div class="list-item-size">{{ .ReadingTime }} min read</div>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
